<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
:root {
  --fs: 18px;
  --lh: 2.0;
  --rw: 90dvw;
  --rh: 90dvh;
  --ff: "Hiragino Mincho ProN", "ヒラギノ明朝 ProN", serif;
}

* { box-sizing: border-box; }
html, body { margin: 0;  width: 100%; height: 100%; overflow: hidden; background: #ffffff; }

@media (prefers-color-scheme: dark) {
  html, body { background: #1c1c1e; }
}

.container {
  width: 100dvw;
  height: 100dvh;
  display: flex;
  align-items: center;
}

#content {
  width: var(--rw);
  height: var(--rh);
  margin: auto;
  column-width: var(--rh);
  column-gap: 0;
  writing-mode: vertical-rl;
  text-orientation: mixed;
  overflow-x: hidden;
  overflow-y: scroll;
  font-size: var(--fs);
  line-height: var(--lh);
  font-family: var(--ff);
  color: #1a1a1a;
  background: #ffffff;
  -webkit-text-size-adjust: none;
}

p { margin: 0; padding: 0; }
ruby rt { font-size: 0.5em; }

@media (prefers-color-scheme: dark) {
  #content { color: #e8e8e8; background: #1c1c1e; }
}
</style>
</head>
<body>
<div class="container"><div id="content"></div></div>  
<script>
const contentEl = document.querySelector('#content'); 

function _pageHeight() {
  return contentEl.getBoundingClientRect().height;
}

function _syncColumnWidth() {
  contentEl.style.columnWidth = _pageHeight() + 'px';
}

function setContent(html, savedOffset) {
  contentEl.innerHTML = html;
  _syncColumnWidth();
  contentEl.scrollTop = (savedOffset != null) ? savedOffset : 0;
}

function pageForward() {
  const h = _pageHeight();
  const page = Math.round(contentEl.scrollTop / h);
  contentEl.scrollTop = (page + 1) * h;
}

function pageBack() {
  const h = _pageHeight();
  const page = Math.round(contentEl.scrollTop / h);
  contentEl.scrollTop = Math.max(0, (page - 1) * h);
}

function setStyles(fs, lh, rh, rw, ff) {
  const root = document.documentElement;
  root.style.setProperty('--fs', fs + 'px');
  root.style.setProperty('--lh', lh);
  root.style.setProperty('--rw', rw + 'dvw');
  root.style.setProperty('--rh', rh + 'dvh');
  root.style.setProperty('--ff', ff);
}

contentEl.addEventListener('scrollend', function() {
  if (window.webkit && window.webkit.messageHandlers.scrollChanged) {
    window.webkit.messageHandlers.scrollChanged.postMessage(contentEl.scrollTop);
  }
}, { passive: true });
</script>
</body>
</html>
