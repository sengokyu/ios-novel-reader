<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
:root {
  --fs: 18px;
  --lh: 2.0;
  --pt: 20px;
  --ph: 16px;
  --ff: "Hiragino Mincho ProN", "ヒラギノ明朝 ProN", serif;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #ffffff; }

@media (prefers-color-scheme: dark) {
  html, body { background: #1c1c1e; }
}

#content {
  writing-mode: vertical-rl;
  text-orientation: upright;
  width: 100dvw;
  height: 100dvh;
  padding: var(--pt) var(--ph);
  overflow-x: scroll;
  overflow-y: hidden;
  font-size: var(--fs);
  line-height: var(--lh);
  font-family: var(--ff);
  color: #1a1a1a;
  background: #ffffff;
  -webkit-text-size-adjust: none;
}

p { margin: 0; padding: 0.1em 0; }
ruby rt { font-size: 0.5em; }

@media (prefers-color-scheme: dark) {
  #content { color: #e8e8e8; background: #1c1c1e; }
}
</style>
</head>
<body>
<div id="content"></div>
<script>
const el = document.getElementById('content');

function setContent(html, savedOffset) {
  el.innerHTML = html;
  requestAnimationFrame(function() {
    el.scrollLeft = (savedOffset != null) ? savedOffset : el.scrollWidth - el.clientWidth;
  });
}

function pageForward() {
  el.scrollBy({ left: -el.clientWidth });
}

function pageBack() {
  el.scrollBy({ left: el.clientWidth });
}

function setStyles(fs, lh, pt, ph, ff) {
  const root = document.documentElement;
  root.style.setProperty('--fs', fs + 'px');
  root.style.setProperty('--lh', lh);
  root.style.setProperty('--pt', pt + 'px');
  root.style.setProperty('--ph', ph + 'px');
  root.style.setProperty('--ff', ff);
}

el.addEventListener('scrollend', function() {
  if (window.webkit && window.webkit.messageHandlers.scrollChanged) {
    window.webkit.messageHandlers.scrollChanged.postMessage(el.scrollLeft);
  }
}, { passive: true });
</script>
</body>
</html>
